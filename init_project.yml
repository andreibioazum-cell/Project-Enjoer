# init_project.yml
name: Init Project

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v2

      - name: Set up JDK 11
        uses: actions/setup-java@v1
        with:
          java-version: '11'

      - name: Build with Gradle
        run: ./gradlew build
        env:
          ANDROID_HOME: /usr/local/android-sdk

      - name: Add Google Play Services Plugin
        run: echo 'apply plugin: "com.google.gms.google-services"' >> app/build.gradle

      - name: Configure Android Gradle Plugin
        run: |
          sed -i 's/classpath "com.android.tools.build:gradle:[^']*"/classpath "com.android.tools.build:gradle:7.1.0"/' build.gradle

      - name: Run tests
        run: ./gradlew test