                          firebaseManager.saveLevel(name, ren.blocks, new FirebaseManager.LevelsCallback() {
                              @Override public void onLevelsLoaded(List<FirebaseManager.LevelInfo> levels) {}
                              @Override public void onLevelSaved(String levelId) { showToast("Level saved! ID: " + levelId.substring(0, 8)); }
                              @Override public void onLevelLoaded(CopyOnWriteArrayList<Block> blocks) {}
                              @Override public void onError(String error) { showToast("Error: " + error); }
                          });
                      })
                      .setNegativeButton("Cancel", null)
                      .show();
              }
              
              private void showOnlineLevelsDialog() {
                  firebaseManager.getAllLevels(new FirebaseManager.LevelsCallback() {
                      @Override
                      public void onLevelsLoaded(List<FirebaseManager.LevelInfo> levels) {
                          String[] items = new String[levels.size()];
                          for (int i = 0; i < levels.size(); i++) {
                              FirebaseManager.LevelInfo l = levels.get(i);
                              items[i] = l.name + " (👍" + l.likes + " | 👤" + l.plays + ")";
                          }
                          new AlertDialog.Builder(MainActivity.this)
                              .setTitle("Online Levels")
                              .setItems(items, (d, which) -> {
                                  FirebaseManager.LevelInfo selected = levels.get(which);
                                  firebaseManager.loadLevel(selected.id, new FirebaseManager.LevelsCallback() {
                                      @Override public void onLevelsLoaded(List<FirebaseManager.LevelInfo> levels) {}
                                      @Override public void onLevelSaved(String levelId) {}
                                      @Override
                                      public void onLevelLoaded(CopyOnWriteArrayList<Block> blocks) {
                                          ren.blocks = blocks;
                                          ren.isEngineMode = false;
                                          ren.isPlayingLevel = false;
                                          ren.pX = 0; ren.pY = 7; ren.pZ = 15;
                                          menuUI.setVisibility(View.GONE);
                                          gameUI.setVisibility(View.VISIBLE);
                                          showToast("Loaded: " + selected.name);
                                      }
                                      @Override public void onError(String error) { showToast("Error: " + error); }
                                  });
                              })
                              .setNegativeButton("Cancel", null)
                              .show();
                      }
                      @Override public void onLevelSaved(String levelId) {}
                      @Override public void onLevelLoaded(CopyOnWriteArrayList<Block> blocks) {}
                      @Override public void onError(String error) { showToast("Error loading levels: " + error); }
                  });
              }
              
              @Override protected void onSaveInstanceState(Bundle outState) { super.onSaveInstanceState(outState); outState.putInt("mode", pendingMode); }
              private void resetP() { ren.pX = 0; ren.pY = 7; ren.pZ = 15; ren.vY = 0; }
              private void axisBtn(int id, float dx, float dy, float dz) { findViewById(id).setOnTouchListener((v, e) -> { if (e.getAction() == MotionEvent.ACTION_DOWN || e.getAction() == MotionEvent.ACTION_MOVE) ren.moveSelected(dx * .5f, dy * .5f, dz * .5f); return true; }); }
              private void updAxis() { runOnUiThread(() -> axisPanel.setVisibility(ren.selectedIndex >= 0 ? View.VISIBLE : View.GONE)); }
              private void setupJoy(View base, View stick) {
                  base.setOnTouchListener((v, e) -> {
                      float cx = v.getWidth() / 2f, cy = v.getHeight() / 2f;
                      if (e.getAction() == MotionEvent.ACTION_MOVE || e.getAction() == MotionEvent.ACTION_DOWN) {
                          float dx = e.getX() - cx, dy = e.getY() - cy, d = (float)Math.sqrt(dx*dx + dy*dy), lim = cx - stick.getWidth() / 2f;
                          if (d > lim) { dx *= lim / d; dy *= lim / d; }
                          stick.setTranslationX(dx); stick.setTranslationY(dy);
                          ren.jX = dx / lim; ren.jY = dy / lim;
                      } else if (e.getAction() == MotionEvent.ACTION_UP) {
                          stick.setTranslationX(0); stick.setTranslationY(0);
                          ren.jX = 0; ren.jY = 0;
                      }
                      return true;
                  });
              }
              private void setupLook(View z) {
                  z.setOnTouchListener((v, e) -> {
                      if (e.getAction() == MotionEvent.ACTION_DOWN) { lx = e.getX(); ly = e.getY(); }
                      else if (e.getAction() == MotionEvent.ACTION_MOVE) {
                          ren.rY += (e.getX() - lx) * .25f;
                          ren.rX = Math.max(-85, Math.min(85, ren.rX - (e.getY() - ly) * .25f));
                          lx = e.getX(); ly = e.getY();
                      }
                      return true;
                  });
              }
              private void updBtnGrp(Button[] btns, int sel) {
                  for (int i = 0; i < btns.length; i++) {
                      if (i == sel) { btns[i].setBackgroundResource(R.drawable.btn_blue_filled); btns[i].setTextColor(0xFF000000); }
                      else { btns[i].setBackgroundResource(R.drawable.btn_blue); btns[i].setTextColor(0xFF00BFFF); }
                  }
              }
              private void updColSel(int sel) {
                  for (int i = 0; i < colorBtn.length; i++) {
                      try { GradientDrawable bg = (GradientDrawable) colorBtn[i].getBackground(); if (i == sel) bg.setStroke(6, 0xFFFFFFFF); else bg.setStroke(2, 0xFF00BFFF); } catch (Exception ignored) {}
                  }
              }
          }
