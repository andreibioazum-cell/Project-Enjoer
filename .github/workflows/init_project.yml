              /**
               * Обработка касания по координатам сцены.
               * Проверяем все объекты в обратном порядке (верхний первый)
               * и вызываем event_tap для попавшего.
               */
              private void handleStageTap(float tapX, float tapY){
                  SceneItem sc = currentScene();
                  if(sc == null) return;

                  // Проходим с конца (верхние объекты поверх нижних)
                  for(int i = sc.objects.size() - 1; i >= 0; i--){
                      ObjectItem o = sc.objects.get(i);
                      if(!o.visible) continue;

                      // Определяем размер объекта
                      float ow = o.w;
                      float oh = o.h;

                      // Для emoji и text используем примерный размер если w/h маленькие
                      if("emoji".equals(o.spriteType)){
                          ow = Math.max(ow, 60f);
                          oh = Math.max(oh, 60f);
                      } else if("text".equals(o.spriteType)){
                          ow = Math.max(ow, 100f);
                          oh = Math.max(oh, 50f);
                      }

                      if(tapX >= o.x && tapX <= o.x + ow && tapY >= o.y && tapY <= o.y + oh){
                          ScriptRuntime.tapped(this, o);
                          break; // Только верхний объект
                      }
                  }
              }

              private void saveAll(){ ProjectStore.save(this, projects); }
              private void toast(String s){ Toast.makeText(this, s, Toast.LENGTH_SHORT).show(); }

              private ProjectItem currentProject(){
                  if(currentProject < 0 || currentProject >= projects.size()) return null;
                  return projects.get(currentProject);
              }

              private SceneItem currentScene(){
                  ProjectItem p = currentProject();
                  if(p == null || currentScene < 0 || currentScene >= p.scenes.size()) return null;
                  return p.scenes.get(currentScene);
              }

              private ObjectItem currentObject(){
                  SceneItem s = currentScene();
                  if(s == null || currentObject < 0 || currentObject >= s.objects.size()) return null;
                  return s.objects.get(currentObject);
              }

