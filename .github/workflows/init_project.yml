              private void showAssignTextureDialog(int objectIndex){
                  ProjectItem p = currentProject();
                  SceneItem s = currentScene();
                  if(p == null || s == null) return;

                  String[] items = new String[p.textures.size()+1];
                  items[0] = "+ Импортировать новую";
