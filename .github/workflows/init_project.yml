          cat <<EOF > app/src/main/java/com/pocketultra/ruv2/ProjectItem.java
          package com.pocketultra.ruv2;

          import java.util.ArrayList;

          public class ProjectItem {
              public String name = "Проект";
              public ArrayList<SceneItem> scenes = new ArrayList<>();
              public ArrayList<TextureItem> textures = new ArrayList<>();
              public ArrayList<VariableItem> variables = new ArrayList<>();
              public ArrayList<ListItemModel> lists = new ArrayList<>();
