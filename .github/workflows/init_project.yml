name: STEP 2 - Auto Build APK
on:
  workflow_run:
    workflows: ["STEP 1 - Initialize Source"]
    types:
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    # Запускать только если STEP 1 прошел успешно
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Assemble
        run: |
          mkdir -p app/src/main/java/com/enjoer/game app/src/main/res/layout app/src/main/res/values app/src/main/res/drawable
          cp src_files/java/*.java app/src/main/java/com/enjoer/game/
          cp src_files/layout/*.xml app/src/main/res/layout/
          echo "<resources><style name='AppTheme' parent='Theme.AppCompat.Light.NoActionBar'><item name='android:windowFullscreen'>true</item></style></resources>" > app/src/main/res/values/themes.xml
          echo "<shape xmlns:android='http://schemas.android.com/apk/res/android'><solid android:color='#101820'/><stroke android:width='2dp' android:color='#00BFFF'/></shape>" > app/src/main/res/drawable/btn_blue.xml
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="Enjoer Auto" android:theme="@style/AppTheme">
          <activity android:name="com.enjoer.game.MainActivity" android:exported="true" android:screenOrientation="landscape">
          <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
          </activity></application></manifest>
          EOF
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "plugins { id 'com.android.application' } android { namespace 'com.enjoer.game'; compileSdk 34; defaultConfig { applicationId 'com.enjoer.game'; minSdk 24; targetSdk 34 } } dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }" > app/build.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } } allprojects { repositories { google(); mavenCentral() } }" > build.gradle

      - name: Build
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Fully_Automatic
          path: app/build/outputs/apk/debug/app-debug.apk
