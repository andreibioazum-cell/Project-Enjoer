name: STEP 2 - Auto Build APK

on:
  push:
  workflow_run:
    workflows: ["STEP 1 - Initialize Source"]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Prepare Android Project
        run: |
          # 1. Чистим старое и создаем структуру
          rm -rf app build.gradle settings.gradle gradle.properties
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # 2. Копируем исходники из Инициализатора (если они есть)
          if [ -d "src_files" ]; then
            cp -r src_files/java/. app/src/main/java/com/enjoer/game/ || true
            cp -r src_files/layout/. app/src/main/res/layout/ || true
          fi

          # 3. Генерируем ГРАВИЛЬНЫЕ конфиги Gradle (без ошибок null object)
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.enjoer.game'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.enjoer.game'
                  minSdk 24
                  targetSdk 34
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties

          # 4. Генерируем Manifest и Ресурсы
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Enjoer 6.2" android:theme="@style/Theme.App">
                  <activity android:name="com.enjoer.game.MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo "<resources><style name='Theme.App' parent='Theme.AppCompat.Light.NoActionBar'/></resources>" > app/src/main/res/values/styles.xml
          echo "<shape xmlns:android='http://schemas.android.com/apk/res/android' android:shape='oval'><solid android:color='#4400BFFF'/><stroke android:width='2dp' android:color='#00BFFF'/></shape>" > app/src/main/res/drawable/joy_bg.xml
          echo "<shape xmlns:android='http://schemas.android.com/apk/res/android'><corners android:radius='15dp'/><solid android:color='#00BFFF'/></shape>" > app/src/main/res/drawable/btn_style.xml

      - name: Build with Gradle
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload Result APK
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_V6_2_Final
          path: app/build/outputs/apk/debug/app-debug.apk
