name: Enjoer_Keyboard_Final_v2.6
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project
        run: |
          rm -rf app/src/main/java/com/enjoer
          rm -rf app/src/main/res/values/*
          rm -rf app/src/main/res/xml
          rm -rf app/src/main/res/layout
          
          mkdir -p app/src/main/java/com/enjoer/keyboard
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/drawable

          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties

          # 1. Манифест
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <application android:label="Enjoer Keyboard" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <service android:name=".EnjoerIME" android:permission="android.permission.BIND_INPUT_METHOD" android:exported="true">
                      <intent-filter><action android:name="android.view.InputMethod" /></intent-filter>
                      <meta-data android:name="android.view.im" android:resource="@xml/method" />
                  </service>
                  <activity android:name=".SettingsActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 2. Метод
          echo '<input-method xmlns:android="http://schemas.android.com/apk/res/android" />' > app/src/main/res/xml/method.xml

          # 3. ИСПРАВЛЕННАЯ РУССКАЯ РАСКЛАДКА (убрана ошибка ?123)
          cat <<'EOF' > app/src/main/res/xml/qwerty_ru.xml
          <Keyboard xmlns:android="http://schemas.android.com/apk/res/android" android:keyWidth="9%p" android:keyHeight="55dp" android:horizontalGap="1%p">
              <Row>
                  <Key android:codes="1081" android:keyLabel="й"/><Key android:codes="1094" android:keyLabel="ц"/><Key android:codes="1091" android:keyLabel="у"/><Key android:codes="1082" android:keyLabel="к"/><Key android:codes="1077" android:keyLabel="е"/><Key android:codes="1085" android:keyLabel="н"/><Key android:codes="1075" android:keyLabel="г"/><Key android:codes="1096" android:keyLabel="ш"/><Key android:codes="1097" android:keyLabel="щ"/><Key android:codes="1079" android:keyLabel="з"/><Key android:codes="1093" android:keyLabel="х"/>
              </Row>
              <Row>
                  <Key android:codes="1092" android:keyLabel="ф"/><Key android:codes="1099" android:keyLabel="ы"/><Key android:codes="1074" android:keyLabel="в"/><Key android:codes="1072" android:keyLabel="а"/><Key android:codes="1087" android:keyLabel="п"/><Key android:codes="1088" android:keyLabel="р"/><Key android:codes="1086" android:keyLabel="о"/><Key android:codes="1083" android:keyLabel="л"/><Key android:codes="1076" android:keyLabel="д"/><Key android:codes="1078" android:keyLabel="ж"/><Key android:codes="1101" android:keyLabel="э"/>
              </Row>
              <Row>
                  <Key android:codes="-102" android:keyLabel="EN" android:keyWidth="12%p"/>
                  <Key android:codes="1103" android:keyLabel="я"/><Key android:codes="1095" android:keyLabel="ч"/><Key android:codes="1089" android:keyLabel="с"/><Key android:codes="1084" android:keyLabel="м"/><Key android:codes="1080" android:keyLabel="и"/><Key android:codes="1090" android:keyLabel="т"/><Key android:codes="1100" android:keyLabel="ь"/><Key android:codes="1073" android:keyLabel="б"/><Key android:codes="1102" android:keyLabel="ю"/><Key android:codes="-5" android:keyLabel="DEL" android:keyWidth="12%p"/>
              </Row>
              <Row>
                  <Key android:codes="-103" android:keyLabel="123" android:keyWidth="20%p"/>
                  <Key android:codes="32" android:keyLabel="SPACE" android:keyWidth="55%p"/>
                  <Key android:codes="-2" android:keyLabel="LANG" android:keyWidth="25%p"/>
              </Row>
          </Keyboard>
          EOF

          # 4. АНГЛИЙСКАЯ И СИМВОЛЫ (чтобы были файлы для переключения)
          cat <<'EOF' > app/src/main/res/xml/qwerty_en.xml
          <Keyboard xmlns:android="http://schemas.android.com/apk/res/android" android:keyWidth="10%p" android:keyHeight="55dp">
              <Row>
                  <Key android:codes="113" android:keyLabel="q"/><Key android:codes="119" android:keyLabel="w"/><Key android:codes="101" android:keyLabel="e"/><Key android:codes="114" android:keyLabel="r"/><Key android:codes="116" android:keyLabel="t"/><Key android:codes="121" android:keyLabel="y"/><Key android:codes="117" android:keyLabel="u"/><Key android:codes="105" android:keyLabel="i"/><Key android:codes="111" android:keyLabel="o"/><Key android:codes="112" android:keyLabel="p"/>
              </Row>
              <Row>
                  <Key android:codes="-101" android:keyLabel="RU" android:keyWidth="15%p"/><Key android:codes="32" android:keyLabel="SPACE" android:keyWidth="50%p"/><Key android:codes="-5" android:keyLabel="DEL" android:keyWidth="15%p"/><Key android:codes="-2" android:keyLabel="LG" android:keyWidth="20%p"/>
              </Row>
          </Keyboard>
          EOF

          echo '<Keyboard xmlns:android="http://schemas.android.com/apk/res/android" android:keyWidth="10%p" android:keyHeight="55dp"><Row><Key android:codes="49" android:keyLabel="1"/><Key android:codes="-101" android:keyLabel="RU" android:keyWidth="90%p"/></Row></Keyboard>' > app/src/main/res/xml/symbols.xml

          # 5. UI и Стили
          cat <<'EOF' > app/src/main/res/layout/keyboard_view.xml
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="wrap_content">
              <TextureView android:id="@+id/kb_video_bg" android:layout_width="match_parent" android:layout_height="280dp" />
              <android.inputmethodservice.KeyboardView android:id="@+id/keyboard" android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:background="#60000000" android:keyBackground="@drawable/key_bg" android:keyTextColor="#00BFFF"/>
          </FrameLayout>
          EOF

          echo '<resources><style name="Theme.AppCompat.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar"/></resources>' > app/src/main/res/values/styles.xml
          echo '<shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#20FFFFFF"/><corners android:radius="5dp"/><stroke android:width="1dp" android:color="#4000BFFF"/></shape>' > app/src/main/res/drawable/key_bg.xml

          # 6. Java логика
          cat <<'EOF' > app/src/main/java/com/enjoer/keyboard/SettingsActivity.java
          package com.enjoer.keyboard;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.net.Uri;
          import android.os.Bundle;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          public class SettingsActivity extends AppCompatActivity {
              private Uri bgUri, soundUri;
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  LinearLayout l = new LinearLayout(this); l.setOrientation(LinearLayout.VERTICAL); l.setPadding(50,50,50,50); l.setBackgroundColor(0xFF050A10);
                  Button b1 = new Button(this); b1.setText("ВЫБРАТЬ ФОН");
                  Button b2 = new Button(this); b2.setText("ВЫБРАТЬ ЗВУК");
                  Button b3 = new Button(this); b3.setText("СОХРАНИТЬ"); b3.setBackgroundColor(0xFF00BFFF);
                  b1.setOnClickListener(v -> { Intent i = new Intent(Intent.ACTION_OPEN_DOCUMENT); i.setType("*/*"); startActivityForResult(i, 1); });
                  b2.setOnClickListener(v -> { Intent i = new Intent(Intent.ACTION_OPEN_DOCUMENT); i.setType("audio/*"); startActivityForResult(i, 2); });
                  b3.setOnClickListener(v -> {
                      SharedPreferences.Editor ed = getSharedPreferences("kb", MODE_PRIVATE).edit();
                      if(bgUri != null) ed.putString("bg", bgUri.toString());
                      if(soundUri != null) ed.putString("snd", soundUri.toString());
                      ed.apply();
                      Toast.makeText(this, "Готово!", Toast.LENGTH_SHORT).show();
                  });
                  l.addView(b1); l.addView(b2); l.addView(b3); setContentView(l);
              }
              @Override
              protected void onActivityResult(int req, int res, Intent d) {
                  super.onActivityResult(req, res, d);
                  if(res == RESULT_OK && d != null) {
                      getContentResolver().takePersistableUriPermission(d.getData(), Intent.FLAG_GRANT_READ_URI_PERMISSION);
                      if(req == 1) bgUri = d.getData(); else soundUri = d.getData();
                  }
              }
          }
          EOF

          cat <<'EOF' > app/src/main/java/com/enjoer/keyboard/EnjoerIME.java
          package com.enjoer.keyboard;
          import android.inputmethodservice.*;
          import android.media.*;
          import android.net.Uri;
          import android.view.*;
          import android.graphics.SurfaceTexture;
          import android.content.Context;
          public class EnjoerIME extends InputMethodService implements KeyboardView.OnKeyboardActionListener, TextureView.SurfaceTextureListener {
              private MediaPlayer mp;
              private SoundPool spool;
              private int sndId = -1;
              private KeyboardView kv;
              private Keyboard kbRu, kbEn, kbSym;
              @Override
              public View onCreateInputView() {
                  View v = getLayoutInflater().inflate(R.layout.keyboard_view, null);
                  TextureView tv = v.findViewById(R.id.kb_video_bg);
                  tv.setSurfaceTextureListener(this);
                  android.content.SharedPreferences prefs = getSharedPreferences("kb", MODE_PRIVATE);
                  String sPath = prefs.getString("snd", null);
                  if(sPath != null) {
                      spool = new SoundPool.Builder().setMaxStreams(5).build();
                      try { sndId = spool.load(getContentResolver().openFileDescriptor(Uri.parse(sPath), "r"), 1); } catch(Exception e){}
                  }
                  kv = v.findViewById(R.id.keyboard);
                  kbRu = new Keyboard(this, R.xml.qwerty_ru);
                  kbEn = new Keyboard(this, R.xml.qwerty_en);
                  kbSym = new Keyboard(this, R.xml.symbols);
                  kv.setKeyboard(kbRu);
                  kv.setOnKeyboardActionListener(this);
                  return v;
              }
              @Override
              public void onSurfaceTextureAvailable(SurfaceTexture st, int w, int h) {
                  String bPath = getSharedPreferences("kb", MODE_PRIVATE).getString("bg", null);
                  if(bPath != null) {
                      try {
                          mp = new MediaPlayer(); mp.setDataSource(this, Uri.parse(bPath));
                          mp.setSurface(new Surface(st)); mp.setLooping(true);
                          mp.prepareAsync(); mp.setOnPreparedListener(MediaPlayer::start);
                      } catch(Exception e){}
                  }
              }
              @Override public void onKey(int c, int[] cs) {
                  if(sndId != -1) spool.play(sndId, 1, 1, 1, 0, 1);
                  if(c == -5) getCurrentInputConnection().deleteSurroundingText(1, 0);
                  else if(c == -2) ((android.view.inputmethod.InputMethodManager)getSystemService(Context.INPUT_METHOD_SERVICE)).showInputMethodPicker();
                  else if(c == -101) kv.setKeyboard(kbRu);
                  else if(c == -102) kv.setKeyboard(kbEn);
                  else if(c == -103) kv.setKeyboard(kbSym);
                  else getCurrentInputConnection().commitText(String.valueOf((char)c), 1);
              }
              @Override public void onSurfaceTextureSizeChanged(SurfaceTexture st, int w, int h) {}
              @Override public boolean onSurfaceTextureUpdated(SurfaceTexture st) { return false; }
              @Override public boolean onSurfaceTextureDestroyed(SurfaceTexture st) { if(mp != null) mp.release(); return true; }
              @Override public void onPress(int p) {}
              @Override public void onRelease(int p) {}
              @Override public void onText(CharSequence t) {}
              @Override public void swipeLeft() {}
              @Override public void swipeRight() {}
              @Override public void swipeDown() {}
              @Override public void swipeUp() {}
          }
          EOF

          # 7. Gradle
          cat <<'EOF' > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          echo "plugins { id 'com.android.application' }
          android { namespace 'com.enjoer.keyboard'; compileSdk 34; defaultConfig { minSdk 24; targetSdk 34 } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }" > app/build.gradle

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Keyboard_Fixed
          path: app/build/outputs/apk/debug/*.apk
