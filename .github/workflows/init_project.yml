                          }
                      })
                      .show();
              }

              private void showObjectMenu(int idx){
                  SceneItem s = currentScene();
                  if(s == null) return;
                  String[] items = {"Переименовать", "Удалить"};
                  new AlertDialog.Builder(this)
                      .setTitle(s.objects.get(idx).name)
                      .setItems(items, (d,w) -> {
                          if(w == 0){
                              EditText input = new EditText(this);
                              input.setText(s.objects.get(idx).name);
                              new AlertDialog.Builder(this)
                                  .setTitle("Переименовать объект")
                                  .setView(input)
                                  .setPositiveButton("ОК", (dd,ww) -> {
                                      s.objects.get(idx).name = input.getText().toString();
                                      saveAll();
                                      renderObjects();
                                  })
                                  .setNegativeButton("Отмена", null)
                                  .show();
                          } else {
                              s.objects.remove(idx);
                              saveAll();
                              renderObjects();
                          }
                      })
                      .show();
              }

              private LinearLayout makeCard(){
                  LinearLayout card = new LinearLayout(this);
                  card.setOrientation(LinearLayout.VERTICAL);
                  card.setBackgroundResource(R.drawable.bg_panel);
                  card.setPadding(dp(12), dp(12), dp(12), dp(12));
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                      LinearLayout.LayoutParams.MATCH_PARENT,
                      LinearLayout.LayoutParams.WRAP_CONTENT
                  );
                  lp.topMargin = dp(10);
                  card.setLayoutParams(lp);
                  return card;
              }

              private TextView title(String s){
                  TextView tv = new TextView(this);
                  tv.setText(s);
                  tv.setTextSize(18f);
                  tv.setTextColor(Color.parseColor("#2E648F"));
                  tv.setTypeface(null, Typeface.BOLD);
                  return tv;
              }

              private TextView subtitle(String s){
                  TextView tv = new TextView(this);
                  tv.setText(s);
                  tv.setTextSize(13f);
                  tv.setTextColor(Color.parseColor("#5D88A8"));
                  return tv;
              }

              private int dp(int v){
                  return (int)(v * getResources().getDisplayMetrics().density);
              }

              private float parseFloat(String s, float d){
                  try { return Float.parseFloat(s); } catch(Exception e){ return d; }
              }

              private String textOr(EditText e, String d){
                  String s = e.getText().toString().trim();
                  return s.isEmpty() ? d : s;
              }
          }
          MAINACT

          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Карманный Код Ультра"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name="com.pocketultra.ruv2.MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo "include ':app'" > settings.gradle

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.pocketultra.ruv2'
              compileSdk 34

              defaultConfig {
                  applicationId 'com.pocketultra.ruv2'
                  minSdk 24
                  targetSdk 34
              }

              buildFeatures {
                  buildConfig true
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Pocket_Code_Ultra_RU_v2_APK
          path: app/build/outputs/apk/debug/app-debug.apk
