              }
              
              @Override public void onSurfaceChanged(GL10 gl, int w, int h) { GLES30.glViewport(0,0,w,h); Matrix.perspectiveM(proj,0,55,(float)w/h,.1f,500f); screenW=w; screenH=h; }
              
              @Override public void onDrawFrame(GL10 gl) {
                  update();
                  GLES30.glClearColor(.005f,.01f,.025f,1f);
                  GLES30.glClear(GLES30.GL_COLOR_BUFFER_BIT|GLES30.GL_DEPTH_BUFFER_BIT);
                  float vx=(float)(Math.sin(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));
                  float vy=(float)Math.sin(Math.toRadians(rX));
                  float vz=(float)(-Math.cos(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));
                  Matrix.setLookAtM(view,0,pX,pY,pZ,pX+vx,pY+vy,pZ+vz,0,1,0);
                  GLES30.glUseProgram(prog);
                  int uMVP=GLES30.glGetUniformLocation(prog,"uMVP"), uM=GLES30.glGetUniformLocation(prog,"uM");
                  int uC=GLES30.glGetUniformLocation(prog,"uC"), uSel=GLES30.glGetUniformLocation(prog,"uSel");
                  int uFloor=GLES30.glGetUniformLocation(prog,"isFloor");
                  GLES30.glUniform3f(GLES30.glGetUniformLocation(prog,"camP"), pX, pY, pZ);
                  GLES30.glVertexAttribPointer(0,3,GLES30.GL_FLOAT,false,0,vBuf); GLES30.glEnableVertexAttribArray(0);
                  GLES30.glVertexAttribPointer(1,3,GLES30.GL_FLOAT,false,0,nBuf); GLES30.glEnableVertexAttribArray(1);
                  
                  // Пол
                  Matrix.setIdentityM(model,0); Matrix.translateM(model,0,0,-.05f,0); Matrix.scaleM(model,0,800,.1f,800);
                  GLES30.glUniform1f(uSel,0f); GLES30.glUniform1f(uFloor,1f); draw(uM,uMVP,uC,.04f,.06f,.1f,1f);
                  GLES30.glUniform1f(uFloor,0f);
                  
                  // Блоки
                  for(int i=0;i<blocks.size();i++) { Block b=blocks.get(i); Matrix.setIdentityM(model,0); Matrix.translateM(model,0,b.x,b.y,b.z); Matrix.scaleM(model,0,b.sx,b.sy,b.sz); GLES30.glUniform1f(uSel,(i==selectedIndex&&isEngineMode&&!isPlayingLevel)?1f:0f); draw(uM,uMVP,uC,b.r,b.g,b.b,1f); }
                  
                  // Другие игроки (красные кубы)
                  for(PlayerData p : otherPlayers) {
                      Matrix.setIdentityM(model,0); Matrix.translateM(model,0,p.x,p.y-1.6f,p.z); Matrix.scaleM(model,0,1f,3.2f,1f);
                      GLES30.glUniform1f(uSel,0f); draw(uM,uMVP,uC,1f,0.2f,0.2f,1f);
                      // Имя над игроком (упрощенно - просто желтая метка)
                      Matrix.setIdentityM(model,0); Matrix.translateM(model,0,p.x,p.y+1f,p.z); Matrix.scaleM(model,0,.5f,.5f,.5f);
                      draw(uM,uMVP,uC,1f,1f,0.2f,1f);
                  }
                  
                  if(isEngineMode&&!isPlayingLevel&&selectedIndex<0) {
                      float vx2=(float)(Math.sin(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));
                      float vy2=(float)Math.sin(Math.toRadians(rX));
                      float vz2=(float)(-Math.cos(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));
                      float px=pX+vx2*placeDist, py=pY+vy2*placeDist, pz=pZ+vz2*placeDist;
                      if(py-blockSY/2<FLOOR_Y) py=FLOOR_Y+blockSY/2;
                      Matrix.setIdentityM(model,0); Matrix.translateM(model,0,px,py,pz); Matrix.scaleM(model,0,blockSX,blockSY,blockSZ);
                      GLES30.glEnable(GLES30.GL_BLEND); GLES30.glBlendFunc(GLES30.GL_SRC_ALPHA,GLES30.GL_ONE_MINUS_SRC_ALPHA);
                      GLES30.glUniform1f(uSel,0f); draw(uM,uMVP,uC,blockR,blockG,blockB,.4f);
                      GLES30.glDisable(GLES30.GL_BLEND);
                  }
              }
              
              private void update() {
                  float s=.35f, rad=(float)Math.toRadians(rY), pitch=(float)Math.toRadians(rX);
                  if(isEngineMode && !isPlayingLevel) {
                      float fx=(float)Math.sin(rad), fz=(float)-Math.cos(rad), fy=(float)Math.sin(pitch);
                      pX+=(fx*-jY+(float)Math.cos(rad)*jX)*s;
                      pZ+=(fz*-jY+(float)Math.sin(rad)*jX)*s;
                      pY+=(fy*-jY)*s; if(pY<1) pY=1;
                  } else {
                      float mX=((float)Math.sin(rad)*-jY+(float)Math.cos(rad)*jX)*s;
                      float mZ=((float)-Math.cos(rad)*-jY+(float)Math.sin(rad)*jX)*s;
                      vY-=.025f; float nX=pX+mX, nY=pY+vY, nZ=pZ+mZ, fY=nY-PLAYER_HEIGHT, hY=nY;
                      if(fY<FLOOR_Y){ nY=FLOOR_Y+PLAYER_HEIGHT; vY=0; }
                      for(Block b:blocks){
                          if(nX+PLAYER_RADIUS>b.minX() && nX-PLAYER_RADIUS<b.maxX() && nZ+PLAYER_RADIUS>b.minZ() && nZ-PLAYER_RADIUS<b.maxZ()){
                              if(pY-PLAYER_HEIGHT>=b.maxY()-.15f && fY<b.maxY()){ nY=b.maxY()+PLAYER_HEIGHT; vY=0; }
                              else if(pY<b.minY() && hY>b.minY()){ nY=b.minY(); vY=0; }
                              else if(fY<b.maxY()-.1f && hY>b.minY()+.1f){
                                  float oX1=(nX+PLAYER_RADIUS)-b.minX(), oX2=b.maxX()-(nX-PLAYER_RADIUS);
                                  float oZ1=(nZ+PLAYER_RADIUS)-b.minZ(), oZ2=b.maxZ()-(nZ-PLAYER_RADIUS);
                                  float minO=Math.min(Math.min(oX1,oX2),Math.min(oZ1,oZ2));
                                  if(minO==oX1) nX=b.minX()-PLAYER_RADIUS;
                                  else if(minO==oX2) nX=b.maxX()+PLAYER_RADIUS;
                                  else if(minO==oZ1) nZ=b.minZ()-PLAYER_RADIUS;
                                  else nZ=b.maxZ()+PLAYER_RADIUS;
                              }
                          }
                      }
                      pX=nX; pY=nY; pZ=nZ;
                  }
              }
              
              public boolean isOnGround() {
                  if(pY-PLAYER_HEIGHT<=FLOOR_Y+.1f) return true;
                  for(Block b:blocks) if(pX+PLAYER_RADIUS>b.minX() && pX-PLAYER_RADIUS<b.maxX() && pZ+PLAYER_RADIUS>b.minZ() && pZ-PLAYER_RADIUS<b.maxZ() && Math.abs((pY-PLAYER_HEIGHT)-b.maxY())<.15f) return true;
                  return false;
              }
              
              private void draw(int uM, int uMVP, int uC, float r, float g, float b, float a) {
                  GLES30.glUniformMatrix4fv(uM,1,false,model,0);
                  float[] res=new float[16]; Matrix.multiplyMM(res,0,proj,0,view,0); Matrix.multiplyMM(res,0,res,0,model,0);
                  GLES30.glUniformMatrix4fv(uMVP,1,false,res,0);
                  GLES30.glUniform4f(uC,r,g,b,a);
                  for(int i=0;i<6;i++) GLES30.glDrawArrays(GLES30.GL_TRIANGLE_STRIP,i*4,4);
              }
              
              private int mkProg(String v, String f) { int p=GLES30.glCreateProgram(); GLES30.glAttachShader(p,mkSh(35633,v)); GLES30.glAttachShader(p,mkSh(35632,f)); GLES30.glLinkProgram(p); return p; }
              private int mkSh(int t, String s) { int sh=GLES30.glCreateShader(t); GLES30.glShaderSource(sh,s); GLES30.glCompileShader(sh); return sh; }
          }
