name: STEP 2 - Auto Build APK

on:
  push:
  workflow_run:
    workflows: ["STEP 1 - Initialize Source"]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Prepare Project
        run: |
          # Полная очистка перед сборкой
          rm -rf app
          mkdir -p app/src/main/java/com/enjoer/game app/src/main/res/layout app/src/main/res/values app/src/main/res/drawable
          
          # Копируем исходники из Инициализатора
          if [ -d "src_files" ]; then
            cp -r src_files/java/. app/src/main/java/com/enjoer/game/ || true
            cp -r src_files/layout/. app/src/main/res/layout/ || true
          fi

          # Конфиги
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" >> gradle.properties

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.enjoer.game'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.enjoer.game'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Enjoer Space" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name="com.enjoer.game.MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo "<resources><style name='AppTheme' parent='Theme.AppCompat.Light.NoActionBar'/></resources>" > app/src/main/res/values/themes.xml

      - name: Build APK
        run: |
          chmod +x gradlew || (gradle wrapper --gradle-version 8.5 && chmod +x gradlew)
          ./gradlew clean assembleDebug --stacktrace

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Final_Build
          path: app/build/outputs/apk/debug/app-debug.apk
