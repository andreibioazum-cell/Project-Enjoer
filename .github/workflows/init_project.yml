name: STEP 2 - Auto Build APK

on:
  push:
  workflow_run:
    workflows: ["STEP 1 - Initialize Source"]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Generate Project Base
        run: |
          rm -rf app build.gradle settings.gradle gradle.properties
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.enjoer.game'
              compileSdk 34
              defaultConfig { applicationId 'com.enjoer.game'; minSdk 24; targetSdk 34 }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties

      - name: Inject Source Files
        run: |
          if [ -d "src_files/java" ] && [ "$(ls -A src_files/java)" ]; then
            echo "Копирую твои исходники..."
            cp -r src_files/java/. app/src/main/java/com/enjoer/game/
            cp -r src_files/layout/. app/src/main/res/layout/
          else
            echo "Файлы не найдены, создаю базу..."
            cat <<'EOF' > app/src/main/java/com/enjoer/game/MainActivity.java
          package com.enjoer.game;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
              }
          }
          EOF
          fi

      - name: Emergency Resources (FIX AAPT ERROR)
        run: |
          # Создаем все стили и drawable, которые могут упоминаться в activity_main.xml
          cat <<'EOF' > app/src/main/res/values/styles.xml
          <resources>
              <style name="Theme.App" parent="Theme.AppCompat.Light.NoActionBar"/>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar"/>
          </resources>
          EOF

          # Фикс ошибки: создаем btn_blue
          cat <<'EOF' > app/src/main/res/drawable/btn_blue.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <corners android:radius="10dp"/><solid android:color="#00BFFF"/>
          </shape>
          EOF

          # Фикс: создаем joy_base (если он нужен)
          cat <<'EOF' > app/src/main/res/drawable/joy_base.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#4400BFFF"/><stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          EOF

          # На всякий случай добавим btn_style и joy_bg из прошлой версии
          cp app/src/main/res/drawable/btn_blue.xml app/src/main/res/drawable/btn_style.xml
          cp app/src/main/res/drawable/joy_base.xml app/src/main/res/drawable/joy_bg.xml

      - name: Finalize Manifest
        run: |
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Enjoer V6" android:theme="@style/Theme.App">
                  <activity android:name="com.enjoer.game.MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_V6_Fixed
          path: app/build/outputs/apk/debug/app-debug.apk
