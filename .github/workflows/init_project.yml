              private void showBlockTypeDialog(String cat){
                  if("event".equals(cat)){
                      String[] items = {"Когда запущено", "Когда объект нажат", "Когда получен сигнал"};
                      new AlertDialog.Builder(this)
                          .setTitle("События")
                          .setItems(items, (d,w) -> {
                              if(w == 0) insertBlockDialog(new BlockItem("event_start", "Когда запущено", "", ""));
                              else if(w == 1) insertBlockDialog(new BlockItem("event_tap", "Когда объект нажат", "", ""));
                              else askOneArg("Имя сигнала", "сигнал1", v -> insertBlockDialog(new BlockItem("event_signal", "Когда получен сигнал", v, "")));
                          }).show();
                  } else if("motion".equals(cat)){
                      String[] items = {"Двигаться по X", "Двигаться по Y", "Перейти в X Y", "Перейти в сцену"};
                      new AlertDialog.Builder(this)
                          .setTitle("Движение")
                          .setItems(items, (d,w) -> {
                              if(w == 0) askOneArg("Формула X", "10", v -> insertBlockDialog(new BlockItem("move_x", "Двигаться по X", v, "")));
                              else if(w == 1) askOneArg("Формула Y", "10", v -> insertBlockDialog(new BlockItem("move_y", "Двигаться по Y", v, "")));
                              else if(w == 2) askTwoArg("Перейти в X Y", "X+10", "Y", (a,b) -> insertBlockDialog(new BlockItem("go_xy", "Перейти в", a, b)));
                              else askOneArg("Имя сцены", "\"Сцена 2\"", v -> insertBlockDialog(new BlockItem("goto_scene", "Перейти в сцену", v, "")));
                          }).show();
                  } else if("looks".equals(cat)){
                      String[] items = {"Сказать", "Скрыть", "Показать", "Текст объекта"};
                      new AlertDialog.Builder(this)
                          .setTitle("Внешность")
                          .setItems(items, (d,w) -> {
                              if(w == 0) askOneArg("Текст / формула", "\"Привет\"", v -> insertBlockDialog(new BlockItem("say", "Сказать", v, "")));
                              else if(w == 1) insertBlockDialog(new BlockItem("hide", "Скрыть", "", ""));
                              else if(w == 2) insertBlockDialog(new BlockItem("show", "Показать", "", ""));
                              else askOneArg("Новый текст", "\"Текст\"", v -> {
                                  ObjectItem o = currentObject();
                                  if(o != null){
                                      o.spriteType = "text";
                                      o.text = v.replace("\"", "");
                                      saveAll();
                                      renderObjects();
                                  }
                              });
                          }).show();
                  } else if("control".equals(cat)){
                      String[] items = {"Ждать", "Вечно", "Конец вечно"};
                      new AlertDialog.Builder(this)
                          .setTitle("Управление")
                          .setItems(items, (d,w) -> {
                              if(w == 0) askOneArg("Секунды", "1", v -> insertBlockDialog(new BlockItem("wait", "Ждать", v, "")));
                              else if(w == 1) insertBlockDialog(new BlockItem("forever", "Вечно", "", ""));
                              else insertBlockDialog(new BlockItem("end_forever", "Конец вечно", "", ""));
                          }).show();
                  } else if("data".equals(cat)){
                      String[] items = {"Установить переменную", "Изменить переменную", "Добавить в список"};
                      new AlertDialog.Builder(this)
                          .setTitle("Данные")
                          .setItems(items, (d,w) -> {
                              if(w == 0) chooseVariable((name) -> askOneArg("Значение / формула", "10", val -> insertBlockDialog(new BlockItem("set_var", "Установить переменную", name, val))));
                              else if(w == 1) chooseVariable((name) -> askOneArg("Прибавить / формула", "1", val -> insertBlockDialog(new BlockItem("change_var", "Изменить переменную", name, val))));
                              else chooseList((name) -> askOneArg("Значение", "\"элемент\"", val -> insertBlockDialog(new BlockItem("list_add", "Добавить в список", name, val))));
                          }).show();
                  } else if("signal".equals(cat)){
                      String[] items = {"Послать сигнал"};
                      new AlertDialog.Builder(this)
                          .setTitle("Сигналы")
                          .setItems(items, (d,w) -> askOneArg("Имя сигнала", "сигнал1", v -> insertBlockDialog(new BlockItem("signal", "Послать сигнал", v, ""))))
                          .show();
                  }
              }

              private interface OneArg { void ok(String v); }
              private interface TwoArg { void ok(String a, String b); }
              private interface PickName { void pick(String name); }

              private void chooseVariable(PickName cb){
                  ProjectItem p = currentProject();
                  if(p == null || p.variables.isEmpty()){
                      toast("Сначала создай переменную");
                      return;
                  }
                  String[] arr = new String[p.variables.size()];
                  for(int i=0;i<p.variables.size();i++) arr[i] = p.variables.get(i).name;
                  new AlertDialog.Builder(this)
                      .setTitle("Выбери переменную")
                      .setItems(arr, (d,w) -> cb.pick(arr[w]))
                      .show();
              }

              private void chooseList(PickName cb){
                  ProjectItem p = currentProject();
                  if(p == null || p.lists.isEmpty()){
                      toast("Сначала создай список");
                      return;
                  }
                  String[] arr = new String[p.lists.size()];
                  for(int i=0;i<p.lists.size();i++) arr[i] = p.lists.get(i).name;
                  new AlertDialog.Builder(this)
                      .setTitle("Выбери список")
                      .setItems(arr, (d,w) -> cb.pick(arr[w]))
                      .show();
              }

              private void askOneArg(String title, String def, OneArg cb){
                  EditText input = new EditText(this);
                  input.setText(def);

                  new AlertDialog.Builder(this)
                      .setTitle(title)
                      .setView(input)
                      .setPositiveButton("ОК", (d,w) -> cb.ok(input.getText().toString()))
                      .setNeutralButton("Переменные", (d,w) -> chooseVariable(cb::ok))
                      .setNegativeButton("Отмена", null)
                      .show();
              }

              private void askTwoArg(String title, String d1, String d2, TwoArg cb){
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  EditText a = new EditText(this);
                  EditText b = new EditText(this);
                  a.setText(d1);
                  b.setText(d2);
                  a.setHint("X");
                  b.setHint("Y");
                  root.addView(a);
                  root.addView(b);

                  new AlertDialog.Builder(this)
                      .setTitle(title)
                      .setView(root)
                      .setPositiveButton("ОК", (d,w) -> cb.ok(a.getText().toString(), b.getText().toString()))
                      .setNegativeButton("Отмена", null)
                      .show();
              }

              private void insertBlockDialog(BlockItem block){
                  ObjectItem o = currentObject();
                  if(o == null) return;

                  String[] opts = new String[o.blocks.size()+1];
                  opts[0] = "В конец";
                  for(int i=0;i<o.blocks.size();i++){
                      opts[i+1] = "Перед: " + o.blocks.get(i).label;
                  }

                  new AlertDialog.Builder(this)
                      .setTitle("Куда вставить блок?")
                      .setItems(opts, (d,w) -> {
                          if(w == 0) o.blocks.add(block);
                          else o.blocks.add(w-1, block);
                          saveAll();
                          renderBlocks();
                      })
                      .show();
              }

              private void showBlockMenu(int idx){
                  ObjectItem o = currentObject();
                  if(o == null) return;
                  BlockItem b = o.blocks.get(idx);

                  String[] items = {"Удалить", "Изменить Arg1", "Изменить Arg2"};
                  new AlertDialog.Builder(this)
                      .setTitle("Блок")
                      .setItems(items, (d,w) -> {
                          if(w == 0){
                              o.blocks.remove(idx);
                              saveAll();
                              renderBlocks();
                          } else if(w == 1){
                              askOneArg("Arg1", b.arg1 == null ? "" : b.arg1, val -> {
                                  b.arg1 = val;
                                  saveAll();
                                  renderBlocks();
                              });
                          } else if(w == 2){
                              askOneArg("Arg2", b.arg2 == null ? "" : b.arg2, val -> {
                                  b.arg2 = val;
                                  saveAll();
                                  renderBlocks();
                              });
                          }
                      })
                      .show();
              }

              private void showProjectMenu(int idx){
                  String[] items = {"Переименовать", "Удалить"};
                  new AlertDialog.Builder(this)
                      .setTitle(projects.get(idx).name)
                      .setItems(items, (d,w) -> {
                          if(w == 0){
                              EditText input = new EditText(this);
                              input.setText(projects.get(idx).name);
                              new AlertDialog.Builder(this)
                                  .setTitle("Переименовать проект")
                                  .setView(input)
                                  .setPositiveButton("ОК", (dd,ww) -> {
                                      projects.get(idx).name = input.getText().toString();
                                      saveAll();
                                      renderProjects();
                                  })
                                  .setNegativeButton("Отмена", null)
                                  .show();
                          } else {
                              projects.remove(idx);
                              saveAll();
                              renderProjects();
                          }
                      })
                      .show();
              }

              private void showSceneMenu(int idx){
                  ProjectItem p = currentProject();
                  if(p == null) return;
                  String[] items = {"Переименовать", "Удалить"};
                  new AlertDialog.Builder(this)
                      .setTitle(p.scenes.get(idx).name)
                      .setItems(items, (d,w) -> {
                          if(w == 0){
                              EditText input = new EditText(this);
