name: STEP 2 - Auto Build APK

on:
  push:
  workflow_run:
    workflows: ["STEP 1 - Initialize Source"]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Clean and Prepare Project
        run: |
          # Полная очистка
          rm -rf app build.gradle settings.gradle gradle.properties
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # ПРОВЕРКА: Если папки src_files нет — создаем файлы сами прямо тут
          if [ ! -d "src_files/java" ]; then
            echo "ВНИМАНИЕ: src_files не найден, создаю аварийный код..."
            mkdir -p src_files/java src_files/layout
            
            # Аварийная MainActivity
            cat <<'EOF' > app/src/main/java/com/enjoer/game/MainActivity.java
            package com.enjoer.game;
            import android.os.Bundle;
            import androidx.appcompat.app.AppCompatActivity;
            import android.opengl.GLSurfaceView;
            public class MainActivity extends AppCompatActivity {
                @Override protected void onCreate(Bundle bundle) {
                    super.onCreate(bundle);
                    GLSurfaceView gv = new GLSurfaceView(this);
                    gv.setEGLContextClientVersion(3);
                    gv.setRenderer(new GameRenderer());
                    setContentView(gv);
                }
            }
            EOF

            # Аварийный Renderer (с исправленными звездами)
            cat <<'EOF' > app/src/main/java/com/enjoer/game/GameRenderer.java
            package com.enjoer.game;
            import android.opengl.*;
            import javax.microedition.khronos.egl.EGLConfig;
            import javax.microedition.khronos.opengles.GL10;
            import java.nio.*;
            public class GameRenderer implements GLSurfaceView.Renderer {
                private int prog; private FloatBuffer vBuf;
                private float[] proj=new float[16], view=new float[16], model=new float[16];
                @Override public void onSurfaceCreated(GL10 gl, EGLConfig cfg) {
                    GLES30.glClearColor(0,0,0.05f,1);
                    String vs="#version 300 es\nlayout(location=0)in vec4 aP;uniform mat4 uMVP;void main(){gl_Position=uMVP*aP;}";
                    String fs="#version 300 es\nprecision highp float;out vec4 fC;void main(){fC=vec4(0.0,0.7,1.0,1.0);}";
                    int vsh=GLES30.glCreateShader(35633); GLES30.glShaderSource(vsh,vs); GLES30.glCompileShader(vsh);
                    int fsh=GLES30.glCreateShader(35632); GLES30.glShaderSource(fsh,fs); GLES30.glCompileShader(fsh);
                    prog=GLES30.glCreateProgram(); GLES30.glAttachShader(prog,vsh); GLES30.glAttachShader(prog,fsh); GLES30.glLinkProgram(prog);
                    float[] v={-0.5f,0.5f,0, -0.5f,-0.5f,0, 0.5f,0.5f,0, 0.5f,-0.5f,0};
                    vBuf=ByteBuffer.allocateDirect(v.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(v); vBuf.position(0);
                }
                @Override public void onSurfaceChanged(GL10 gl,int w,int h){ GLES30.glViewport(0,0,w,h); Matrix.perspectiveM(proj,0,60,(float)w/h,0.1f,100f); }
                @Override public void onDrawFrame(GL10 gl){
                    GLES30.glClear(16640); GLES30.glUseProgram(prog);
                    Matrix.setIdentityM(view,0); Matrix.translateM(view,0,0,0,-3);
                    float[] mvp=new float[16]; Matrix.multiplyMM(mvp,0,proj,0,view,0);
                    GLES30.glUniformMatrix4fv(GLES30.glGetUniformLocation(prog,"uMVP"),1,false,mvp,0);
                    GLES30.glVertexAttribPointer(0,3,GLES30.GL_FLOAT,false,0,vBuf); GLES30.glEnableVertexAttribArray(0);
                    GLES30.glDrawArrays(5,0,4);
                }
            }
            EOF
          else
            # Если папка есть — копируем как обычно
            cp -r src_files/java/. app/src/main/java/com/enjoer/game/
            cp -r src_files/layout/. app/src/main/res/layout/
          fi

          # Генерируем Gradle файлы
          cat <<'EOF' > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android { namespace 'com.enjoer.game'; compileSdk 34; defaultConfig { applicationId 'com.enjoer.game'; minSdk 24; targetSdk 34 } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties

          # Manifest
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Enjoer 6.2" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name="com.enjoer.game.MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_V6_2
          path: app/build/outputs/apk/debug/app-debug.apk
