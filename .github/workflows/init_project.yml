name: FORCE BUILD APK
on: 
  push:     # Запуск при любом пуше в любую ветку
  workflow_dispatch: # Кнопка для ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Sync Folders
        run: |
          # Создаем структуру заново, чтобы Gradle точно всё увидел
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # Копируем всё из твоих папок
          cp -r src_files/java/. app/src/main/java/com/enjoer/game/ || echo "No java files"
          cp -r src_files/layout/. app/src/main/res/layout/ || echo "No layout files"
          cp -r src_files/values/. app/src/main/res/values/ || echo "No values files"
          cp -r src_files/drawable/. app/src/main/res/drawable/ || echo "No drawable files"
          cp src_files/AndroidManifest.xml app/src/main/AndroidManifest.xml || echo "No manifest"
          
          # Конфиги
          cp src_files/build.gradle ./build.gradle
          cp src_files/app_build.gradle app/build.gradle
          cp src_files/settings.gradle ./settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload Result
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Final_APK
          path: app/build/outputs/apk/debug/app-debug.apk
