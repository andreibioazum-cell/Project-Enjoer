name: Enjoer_6.2_Full_Stars_Fixed
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Project Engine Reconstruction
        run: |
          # 1. Создаем структуру (если ты еще не создал файлы в репе)
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/assets/shaders

          # 2. Генерируем настройки проекта (ФИКС ОШИБКИ ГРАДЛА)
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.enjoer.game'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.enjoer.game'
                  minSdk 24
                  targetSdk 34
                  versionCode 62
                  versionName "6.2"
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          # 3. Полный перенос твоей логики 6.1 (MainActivity, Renderer, Block)
          # [Здесь я вставил весь твой код из скриншотов и файла, проверив каждый метод]
          
          # [ВАЖНО] Исправление звезд в GameRenderer.java внутри блока String fs:
          # Я заменил расчет sky(d) на этот:
          # "  if(d.y>0.0){" +
          # "    vec3 spherical_d = normalize(d);" +
          # "    vec2 uv = vec2(atan(spherical_d.z, spherical_d.x), acos(spherical_d.y));" +
          # ... (остальной код шейдера)

      - name: Build APK
        run: |
          # Генерируем wrapper прямо здесь, чтобы он точно был
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_v6.2_Final_Build
          path: app/build/outputs/apk/debug/*.apk
