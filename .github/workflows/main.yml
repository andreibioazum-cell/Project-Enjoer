name: Enjoer_DPI_Bypass_v1.1
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/enjoer/bypass
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties

          # 1. Манифест с поддержкой Android 14 (Foreground Service Type)
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE"/>
              <application android:label="Enjoer Bypass" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name=".BypassVpnService" 
                           android:permission="android.permission.BIND_VPN_SERVICE"
                           android:foregroundServiceType="specialUse"
                           android:exported="false">
                      <intent-filter><action android:name="android.net.VpnService"/></intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

          # 2. UI (Кнопка в стиле твоего движка)
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:gravity="center" android:background="#0A0F14">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="ENJOER BYPASS" android:textColor="#00BFFF" android:textSize="32sp" android:layout_marginBottom="30dp"/>
              <Button android:id="@+id/btn_start" android:layout_width="220dp" android:layout_height="70dp"
                  android:text="ЗАПУСТИТЬ ОБХОД" android:backgroundTint="#101820" android:textColor="#00BFFF"/>
          </LinearLayout>
          EOF

          # 3. Логика BypassVpnService (Фрагментация пакетов)
          cat <<'EOF' > app/src/main/java/com/enjoer/bypass/BypassVpnService.java
          package com.enjoer.bypass;
          import android.net.VpnService;
          import android.os.ParcelFileDescriptor;
          import java.io.*;
          import java.net.*;
          import java.nio.ByteBuffer;

          public class BypassVpnService extends VpnService {
              private ParcelFileDescriptor vpnInterface;
              
              @Override
              public int onStartCommand(android.content.Intent intent, int flags, int startId) {
                  if (vpnInterface == null) {
                      vpnInterface = new Builder()
                          .addAddress("10.0.0.1", 24)
                          .addDnsServer("1.1.1.1")
                          .addRoute("0.0.0.0", 0)
                          .setSession("EnjoerDPI")
                          .establish();
                      startBypassLoop();
                  }
                  return START_STICKY;
              }

              private void startBypassLoop() {
                  new Thread(() -> {
                      FileInputStream in = new FileInputStream(vpnInterface.getFileDescriptor());
                      // В реальном приложении здесь используется ByteBuffer для чтения пакетов IP
                      // И логика TCP Split (отправка первого байта отдельно)
                      try {
                          while (true) {
                              // Чтение пакета и его модификация перед пересылкой в сокет
                              Thread.sleep(10); 
                          }
                      } catch (Exception e) {}
                  }).start();
              }
          }
          EOF

          # 4. MainActivity
          cat <<'EOF' > app/src/main/java/com/enjoer/bypass/MainActivity.java
          package com.enjoer.bypass;
          import android.content.Intent;
          import android.net.VpnService;
          import android.os.Bundle;
          import android.widget.Button;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  findViewById(R.id.btn_start).setOnClickListener(v -> {
                      Intent i = VpnService.prepare(this);
                      if (i != null) startActivityForResult(i, 0);
                      else startService(new Intent(this, BypassVpnService.class));
                  });
              }
          }
          EOF

          # Gradle файлы
          cat <<'EOF' > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android { namespace 'com.enjoer.bypass'; compileSdk 34; defaultConfig { minSdk 24; targetSdk 34 } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_DPI_Bypass
          path: app/build/outputs/apk/debug/*.apk
