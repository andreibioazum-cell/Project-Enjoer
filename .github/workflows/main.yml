name: Enjoer_DPI_Final_v1.5
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project
        run: |
          # ЖЕСТКАЯ ОЧИСТКА всех старых файлов ресурсов и кода
          rm -rf app/src/main/java/com/enjoer
          rm -rf app/src/main/res/values/*
          rm -rf app/src/main/res/layout/*
          
          mkdir -p app/src/main/java/com/enjoer/bypass
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties

          # 1. Манифест
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE"/>
              <application android:label="Enjoer Bypass" android:theme="@style/AppTheme">
                  <activity android:name="com.enjoer.bypass.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name="com.enjoer.bypass.BypassVpnService" 
                           android:permission="android.permission.BIND_VPN_SERVICE"
                           android:foregroundServiceType="specialUse"
                           android:exported="false">
                      <intent-filter><action android:name="android.net.VpnService"/></intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

          # 2. Единственный файл ресурсов (без дубликатов)
          cat <<'EOF' > app/src/main/res/values/styles.xml
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
              </style>
          </resources>
          EOF

          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:gravity="center" android:background="#0A0F14">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="ENJOER DPI BYPASS" android:textColor="#00BFFF" android:textSize="22sp" android:layout_marginBottom="30dp"/>
              <Button android:id="@+id/btn_start" android:layout_width="220dp" android:layout_height="70dp"
                  android:text="START BYPASS" android:backgroundTint="#101820" android:textColor="#00BFFF"/>
          </LinearLayout>
          EOF

          # 3. Логика VPN с TCP SPLIT (Фрагментация)
          cat <<'EOF' > app/src/main/java/com/enjoer/bypass/BypassVpnService.java
          package com.enjoer.bypass;
          import android.net.VpnService;
          import android.os.ParcelFileDescriptor;
          import java.io.*;
          import java.net.*;
          import java.nio.ByteBuffer;

          public class BypassVpnService extends VpnService {
              private Thread worker;
              private ParcelFileDescriptor vpnInterface;

              @Override
              public int onStartCommand(android.content.Intent intent, int flags, int startId) {
                  if (worker == null) {
                      worker = new Thread(() -> {
                          try {
                              vpnInterface = new Builder()
                                  .addAddress("10.0.0.2", 32)
                                  .addRoute("0.0.0.0", 0)
                                  .addDnsServer("8.8.8.8")
                                  .setSession("EnjoerDPI")
                                  .establish();

                              FileInputStream in = new FileInputStream(vpnInterface.getFileDescriptor());
                              FileOutputStream out = new FileOutputStream(vpnInterface.getFileDescriptor());
                              byte[] buffer = new byte[16384];

                              while (!Thread.interrupted()) {
                                  int len = in.read(buffer);
                                  if (len > 0) {
                                      // ТЕХНИКА TCP SPLIT:
                                      // Если это начало запроса (например, TLS Client Hello или HTTP GET),
                                      // мы отправляем первые 2 байта отдельно, чтобы DPI не считал заголовок.
                                      if (len > 10 && buffer[0] == 0x16) { // Пример для TLS
                                          out.write(buffer, 0, 2);
                                          out.write(buffer, 2, len - 2);
                                      } else {
                                          out.write(buffer, 0, len);
                                      }
                                  }
                              }
                          } catch (Exception e) {}
                      });
                      worker.start();
                  }
                  return START_STICKY;
              }
          }
          EOF

          # 4. MainActivity
          cat <<'EOF' > app/src/main/java/com/enjoer/bypass/MainActivity.java
          package com.enjoer.bypass;
          import android.content.Intent;
          import android.net.VpnService;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(com.enjoer.bypass.R.layout.activity_main);
                  findViewById(com.enjoer.bypass.R.id.btn_start).setOnClickListener(v -> {
                      Intent i = VpnService.prepare(this);
                      if (i != null) startActivityForResult(i, 0);
                      else startService(new Intent(this, BypassVpnService.class));
                  });
              }
          }
          EOF

          # Gradle
          cat <<'EOF' > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android { namespace 'com.enjoer.bypass'; compileSdk 34; defaultConfig { minSdk 24; targetSdk 34 } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Bypass_v1.5_Final
          path: app/build/outputs/apk/debug/*.apk
